<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新北輕軌即時時刻</title>
<script>
(function(){
  var t=localStorage.getItem('ntmetro-theme');
  if(t!=='light'&&t!=='dark')t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
<style>
  :root{
    --danhai:#1a6fc9; --kanding:#0a8f4e; --ankeng:#e8772e;
    --hot:#ff5d73; --warn:#d4920a;
    --accent:#3fc1c9;
  }
  html[data-theme="dark"]{
    --bg:#0f1420; --card:#1a2233; --card2:#222c42; --line:#2c3850;
    --txt:#e8edf6; --sub:#92a0bc;
    --danhai-dim:rgba(26,111,201,.22); --kanding-dim:rgba(10,143,78,.22); --ankeng-dim:rgba(232,119,46,.22);
    --body-grad:radial-gradient(1200px 600px at 50% -10%,#1b2740,#0f1420 60%);
    --badge-wd-bg:rgba(63,193,201,.18); --badge-we-bg:rgba(255,196,77,.18);
    --warn:#ffc44d; --seg-on-txt:#06222a;
    --tab-on-txt:#fff;
  }
  html[data-theme="light"]{
    --bg:#eef2f8; --card:#ffffff; --card2:#f6f8fc; --line:#d4dce8;
    --txt:#152033; --sub:#5a6b82;
    --danhai-dim:rgba(26,111,201,.14); --kanding-dim:rgba(10,143,78,.14); --ankeng-dim:rgba(232,119,46,.14);
    --body-grad:linear-gradient(180deg,#f8fafc 0%,#eef2f8 100%);
    --badge-wd-bg:rgba(10,143,78,.12); --badge-we-bg:rgba(212,146,10,.14);
    --warn:#b87800; --seg-on-txt:#fff;
    --tab-on-txt:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--body-grad);color:var(--txt);min-height:100vh;padding:16px 12px 56px;transition:background .25s,color .25s}
  .wrap{max-width:560px;margin:0 auto}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:2px}
  h1{font-size:1.4rem;margin:0;flex:1;line-height:1.3}
  .top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:2px}
  .ver{font-size:.68rem;color:var(--sub);white-space:nowrap}
  .theme-btn{width:40px;height:40px;border:1px solid var(--line);background:var(--card);color:var(--txt);
    border-radius:12px;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s,transform .15s}
  .theme-btn:hover{transform:scale(1.05)}
  .theme-btn:active{transform:scale(.97)}
  .clock{color:var(--sub);font-size:.9rem;margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.76rem;font-weight:700}
  .badge.wd{background:var(--badge-wd-bg);color:var(--accent)}
  .badge.we{background:var(--badge-we-bg);color:var(--warn)}

  /* 路線分頁 */
  .line-tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;margin-bottom:14px}
  .line-tabs button{flex:1;border:0;background:transparent;color:var(--sub);padding:12px 8px;border-radius:11px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s}
  .line-tabs button.on{color:var(--tab-on-txt)}
  .line-tabs button[data-line="danhai"].on{background:var(--danhai);box-shadow:0 4px 14px rgba(26,111,201,.35)}
  .line-tabs button[data-line="ankeng"].on{background:var(--ankeng);box-shadow:0 4px 14px rgba(232,119,46,.35)}

  /* 線條地圖 */
  .map-card,.card,.line-tabs,.seg,.dir-seg button,.theme-btn{transition:background .25s,border-color .25s,color .25s}
  .map-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 8px 8px;margin-bottom:10px;overflow:visible}
  .map-label{font-size:.72rem;color:var(--sub);margin:0 4px 8px;padding-left:2px}
  .map-scroll{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;scrollbar-width:thin;
    padding:4px 4px 2px;margin:0 -2px}
  .map-scroll::-webkit-scrollbar{height:4px}
  .map-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .route{display:flex;align-items:flex-start;width:max-content;min-width:100%;padding-bottom:2px}
  .route-main{display:flex;align-items:flex-start}
  .route-danhai{display:flex;align-items:center;width:max-content;min-width:100%;padding:0 2px 2px}
  .route-ankeng{display:flex;align-items:flex-start}
  .danhai-row{display:flex;flex-direction:row;align-items:center;flex-shrink:0}
  .trunk-h{display:flex;flex-direction:row;align-items:flex-start;flex-shrink:0}
  .st-wrap{display:flex;flex-direction:column;align-items:center;position:relative;flex-shrink:0}
  .st-wrap .rail{position:absolute;top:11px;left:50%;width:100%;height:3px;background:var(--line);z-index:0}
  .st-wrap:first-child .rail{display:none}
  .st-node{position:relative;z-index:1;min-width:28px;max-width:36px;display:flex;flex-direction:column;align-items:center;
    cursor:pointer;padding:0 1px 2px;border:0;background:none;color:inherit;font:inherit}
  .st-dot{width:22px;height:22px;border-radius:50%;border:3px solid var(--line);background:var(--bg);transition:.2s;flex-shrink:0}
  .st-code{font-size:.55rem;color:var(--sub);margin-top:4px;font-weight:600;letter-spacing:0;line-height:1}
  .st-name{font-size:.6rem;color:var(--sub);margin-top:2px;
    writing-mode:vertical-rl;text-orientation:upright;
    white-space:nowrap;line-height:1.1;letter-spacing:.04em;
    max-height:5.5em;overflow:hidden}
  .st-node.on .st-dot{border-color:currentColor;background:currentColor;box-shadow:0 0 0 4px var(--glow)}
  .st-node.on .st-code,.st-node.on .st-name{color:var(--txt);font-weight:700}
  .st-wrap[data-branch="fisher"] .st-node.on{color:var(--danhai)}
  .st-wrap[data-branch="fisher"] .st-node.on .st-dot{box-shadow:0 0 0 4px var(--danhai-dim)}
  .st-wrap[data-branch="fisher"] .rail{background:color-mix(in srgb,var(--danhai) 45%,var(--line))}
  .st-wrap[data-branch="kanding"] .st-node.on{color:var(--kanding)}
  .st-wrap[data-branch="kanding"] .rail{background:color-mix(in srgb,var(--kanding) 45%,var(--line))}
  .st-wrap[data-branch="kanding"] .st-node.on .st-dot{box-shadow:0 0 0 4px var(--kanding-dim)}

  /* 淡海：V09 分岔 → 右側上漁人碼頭 / 下崁頂 */
  .map-legend{display:flex;gap:12px;margin:0 4px 8px;font-size:.68rem;color:var(--sub)}
  .map-legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .map-legend .lg-fisher i{background:var(--danhai)}
  .map-legend .lg-kanding i{background:var(--kanding)}
  .danhai-row>.h-connector{display:block;width:8px;height:3px;background:var(--line);flex-shrink:0;align-self:center}
  .fork-pack{display:flex;flex-direction:row;align-items:center;flex-shrink:0}
  .fork-pack>.st-wrap .rail{display:none}
  .fork-hub{display:flex;flex-shrink:0;position:relative;align-items:center;padding-left:6px;margin-top:0}
  .fork-hub::before{content:'';position:absolute;left:0;top:11px;bottom:11px;width:3px;background:var(--line);z-index:0}
  .fork-branches{display:flex;flex-direction:column;gap:6px;align-items:flex-start;position:relative;z-index:1}
  .branch-rail{display:flex;flex-direction:row;align-items:flex-start}
  .branch-rail .st-wrap:first-child .rail{display:none}
  .branch-label{font-size:.62rem;color:var(--sub);writing-mode:vertical-rl;text-orientation:upright;
    white-space:nowrap;line-height:1;letter-spacing:.04em;flex-shrink:0;align-self:center;margin-right:4px;
    overflow:visible;max-height:none;width:1em}
  .branch-kanding .branch-label{color:var(--kanding)}
  .branch-fisher .branch-label{color:var(--danhai)}

  /* 方向 */
  .dir-row{margin-bottom:12px}
  .dir-row[hidden]{display:none}
  .dir-seg{display:flex;gap:8px;flex-wrap:wrap}
  .dir-seg button{flex:1;min-width:120px;border:1px solid var(--line);background:var(--card);color:var(--sub);
    padding:10px 12px;border-radius:12px;font-size:.88rem;font-weight:600;cursor:pointer}
  .dir-seg button.on{color:var(--seg-on-txt);background:var(--accent);border-color:var(--accent)}

  /* 班表類型 */
  .type-row{margin-bottom:14px}
  .type-row label{display:block;font-size:.72rem;color:var(--sub);margin:0 0 6px 2px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .seg button{flex:1;background:none;border:0;color:var(--sub);padding:10px 4px;font-size:.88rem;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--accent);color:var(--seg-on-txt)}

  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px}
  .card .tag{font-size:.78rem;color:var(--sub);margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%}
  .next .big{display:flex;align-items:baseline;gap:10px}
  .next .time{font-size:2.8rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .next .to{font-size:1rem;color:var(--sub)}
  .count{margin-top:10px;font-size:1.05rem}
  .count b{font-size:1.7rem;color:var(--accent);font-variant-numeric:tabular-nums}
  .count.soon b{color:var(--hot)}
  .second .time{font-size:1.7rem;font-weight:700;font-variant-numeric:tabular-nums}
  .second{padding:14px 18px}
  .second .row{display:flex;justify-content:space-between;align-items:center}
  .second .c{color:var(--sub);font-variant-numeric:tabular-nums}
  .empty{color:var(--warn);font-size:1.05rem;padding:6px 0}
  .branch-line{margin-top:8px;font-size:.92rem;color:var(--sub)}
  .branch-line b{font-weight:700}
  .dir-seg button .dir-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .foot{color:var(--sub);font-size:.72rem;line-height:1.6;margin-top:16px}
</style>
</head>

  <div id="result"></div>

</div>

const LINE_ORDER = {
  danhai: {
    trunk: ['V01','V02','V03','V04','V05','V06','V07','V08','V09'],
    forkAfter: 'V09',
    kanding: ['V10','V11'],
    fisher: ['V28','V27','V26']
  },
  ankeng: { trunk: ['K01','K02','K03','K04','K05','K06','K07','K08','K09'] }
};
const DEFAULTS = { danhai: 'V01', ankeng: 'K09' };
const KANDING_SET = new Set(['V10','V11']);
const FISHER_TERM = new Set(['V26','V27','V28']);
/** V01–V09：月台色標——綠=崁頂線、藍=漁人碼頭線 */
const TRUNK_DYNAMIC = new Set(['V01','V02','V03','V04','V05','V06','V07','V08','V09']);
const BRANCH_LABEL = { kanding: '崁頂線', fisher: '漁人碼頭線' };

function destBranch(to) {
  return /崁頂/.test(String(to || '')) ? 'kanding' : 'fisher';
}

function dirFromPlatform(e) {
  const s = e.schedule;
  return {
    to: e.to,
    color: e.color,
    origin: e.origin,
    weekday: s.weekday,
    weekend: s.weekend,
  };
}

function mergeHongshulinEntries(entries) {
  const wd = {}, we = {}, branches = {};
  for (const e of entries) {
    const br = e.color === 'green' ? 'kanding' : 'fisher';
    for (const [daytype, dst, prefix] of [
      ['weekday', wd, 'w'],
      ['weekend', we, 'e'],
    ]) {
      const tbl = e.schedule[daytype] || {};
      for (const h in tbl) {
        dst[h] = dst[h] || [];
        for (const m of tbl[h]) {
          const mm = String(m).padStart(2, '0');
          if (!dst[h].includes(mm)) dst[h].push(mm);
          branches[`${prefix}:${h}:${mm}`] = br;
        }
      }
    }
  }
  for (const tbl of [wd, we]) {
    for (const h in tbl) tbl[h].sort((a, b) => parseInt(a, 10) - parseInt(b, 10));
  }
  return {
    to: '紅樹林',
    color: 'mixed',
    weekday: wd,
    weekend: we,
    branches,
  };
}

function getDirections(st) {
  if (!st) return [];
  if (st.directions?.length) return st.directions;
  if (!st.platforms) return [];
  const p = st.platforms;
  if (st.code === 'V01') {
    return (p['1'] || []).map(dirFromPlatform);
  }
  const dirs = [];
  if (p['2']) dirs.push(mergeHongshulinEntries(p['2']));
  for (const e of p['1'] || []) {
    if (/漁人/.test(e.to)) dirs.push(dirFromPlatform(e));
  }
  for (const e of p['1'] || []) {
    if (/崁頂/.test(e.to)) dirs.push(dirFromPlatform(e));
  }
  return dirs;
}

function branchFor(dir, hour, minute, daytype) {
  const m = String(minute).padStart(2, '0');
  const h = String(hour).padStart(2, '0');
  const prefix = daytype === 'weekend' ? 'e' : 'w';
  if (dir.branches?.[`${prefix}:${h}:${m}`]) return dir.branches[`${prefix}:${h}:${m}`];
  if (dir.color === 'green') return 'kanding';
  if (dir.color === 'blue') return 'fisher';
  return destBranch(dir.to);
}

function activeDirection(st) {
  const dirs = getDirections(st);
  if (!dirs.length) return null;
  const i = state.dirIdx < dirs.length ? state.dirIdx : 0;
  return dirs[i];
}

function danhaiBranch(code, dirTo) {
  if (KANDING_SET.has(code)) return 'kanding';
  if (FISHER_TERM.has(code)) return 'fisher';
  if (TRUNK_DYNAMIC.has(code)) {
    if (dirTo !== undefined) return destBranch(dirTo);
    return destBranch(activeDirection(stationByCode(code))?.to);
  }
  return 'fisher';
}

function lineColor() {
  if (state.line === 'ankeng') return 'var(--ankeng)';
  const dir = activeDirection(curStation());
  return danhaiBranch(state.code, dir?.to) === 'kanding' ? 'var(--kanding)' : 'var(--danhai)';
}

function mapBranchForCode(code, byCode) {
  if (state.line !== 'danhai') return null;
  if (KANDING_SET.has(code)) return 'kanding';
  if (FISHER_TERM.has(code)) return 'fisher';
  if (TRUNK_DYNAMIC.has(code) && code === state.code) {
    const dir = activeDirection(byCode[code]);
    return destBranch(dir?.to);
  }
  if (/^V0[1-9]$/.test(code)) return 'fisher';
  return 'fisher';
}

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2, '0');

let state = { line: 'danhai', code: 'V01', dirIdx: 0, type: 'auto' };

function fixTo(label) { return /站$/.test(label) ? label : label + '站'; }

function taipeiNow() {
  const f = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hourCycle: 'h23', weekday: 'short'
  });
  const p = {};
  for (const x of f.formatToParts(new Date())) p[x.type] = x.value;
  let h = parseInt(p.hour, 10);
  if (h === 24) h = 0;
  const wdMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
  const wd = wdMap[p.weekday];
  return {
    h, m: parseInt(p.minute, 10), s: parseInt(p.second, 10), wd,
    text: `${p.year}/${p.month}/${p.day} (${'日一二三四五六'[wd]}) ${pad(h)}:${p.minute}:${p.second}`
  };
}
const isWeekend = wd => wd === 0 || wd === 6;

function stationByCode(code) {
  return DATA[state.line].stations.find(s => s.code === code);
}
function curStation() { return stationByCode(state.code); }

function applyTheme() {
  let col, glow;
  if (state.line === 'danhai') {
    const st = curStation();
    const dir = activeDirection(st);
    let br = danhaiBranch(state.code, dir?.to);
    if (TRUNK_DYNAMIC.has(state.code) && dir) {
      const now = taipeiNow();
      const autoType = isWeekend(now.wd) ? 'weekend' : 'weekday';
      const todayType = state.type === 'auto' ? autoType : state.type;
      const prevType = state.type === 'auto'
        ? (isWeekend((now.wd + 6) % 7) ? 'weekend' : 'weekday')
        : state.type;
      const curSec = now.h * 3600 + now.m * 60 + now.s;
      const next = upcoming(dir, todayType, prevType, curSec)[0];
      if (next?.branch) br = next.branch;
    }
    col = br === 'kanding' ? 'var(--kanding)' : 'var(--danhai)';
    glow = br === 'kanding' ? 'var(--kanding-dim)' : 'var(--danhai-dim)';
  } else {
    col = 'var(--ankeng)';
    glow = 'var(--ankeng-dim)';
  }
  document.documentElement.style.setProperty('--accent', col);
  document.documentElement.style.setProperty('--glow', glow);
}

function nodeHtml(st, selected, branch) {
  const cls = selected ? 'st-node on' : 'st-node';
  const br = branch ? ` data-branch="${branch}"` : '';
  return `<div class="st-wrap"${br}>
    <span class="rail"></span>
    <button type="button" class="${cls}" data-code="${st.code}" aria-label="${st.name}" aria-pressed="${selected}">
      <span class="st-dot"></span>
      <span class="st-code">${st.code}</span>
      <span class="st-name">${st.name}</span>
    </button>
  </div>`;
}

function branchRail(codes, byCode, branchKey, label) {
  const nodes = codes.filter(c => byCode[c]).map(c => nodeHtml(byCode[c], state.code === c, branchKey)).join('');
  return `<div class="branch-rail branch-${branchKey}"><span class="branch-label">${label}</span>${nodes}</div>`;
}

function forkHubHtml(order, byCode) {
  return `<div class="fork-hub" aria-label="分岔支線">
    <div class="fork-branches">
      ${branchRail(order.fisher, byCode, 'fisher', '漁人碼頭')}
      ${branchRail(order.kanding, byCode, 'kanding', '崁頂')}
    </div>
  </div>`;
}

function buildDanhaiMap(order, byCode) {
  const forkAfter = order.forkAfter;
  const trunkCodes = order.trunk.filter(c => c !== forkAfter);
  let trunkHtml = '';
  for (const code of trunkCodes) {
    if (!byCode[code]) continue;
    trunkHtml += nodeHtml(byCode[code], state.code === code, mapBranchForCode(code, byCode));
  }

  let forkPack = '';
  if (byCode[forkAfter]) {
    const v09 = nodeHtml(byCode[forkAfter], state.code === forkAfter, mapBranchForCode(forkAfter, byCode));
    forkPack = `<span class="h-connector" aria-hidden="true"></span>
      <div class="fork-pack">${v09}${forkHubHtml(order, byCode)}</div>`;
  }

  return `<div class="route route-danhai">
    <div class="danhai-row">
      <div class="route-main trunk-h">${trunkHtml}</div>
      ${forkPack}
    </div>
  </div>`;
}

function buildAnkengMap(order, byCode) {
  let html = '<div class="route route-ankeng"><div class="route-main">';
  for (const code of order.trunk) {
    if (!byCode[code]) continue;
    html += nodeHtml(byCode[code], state.code === code, null);
  }
  return html + '</div></div>';
}

function buildMap() {
  const order = LINE_ORDER[state.line];
  const stations = DATA[state.line].stations;
  const byCode = Object.fromEntries(stations.map(s => [s.code, s]));
  if (!byCode[state.code]) state.code = DEFAULTS[state.line];

  $('routeMap').innerHTML = state.line === 'danhai'
    ? buildDanhaiMap(order, byCode)
    : buildAnkengMap(order, byCode);
  $('mapLabel').textContent = DATA[state.line].name + ' · 點選車站';
  $('mapLegend').hidden = state.line !== 'danhai';

  const active = $('routeMap').querySelector('.st-node.on');
  if (active) {
    requestAnimationFrame(() => {
      active.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    });
  }
}

function dirBtnLabel(d) {
  const br = d.color === 'green' ? 'kanding' : d.color === 'blue' ? 'fisher' : null;
  const dot = br
    ? `<span class="dir-dot" style="background:var(--${br === 'kanding' ? 'kanding' : 'danhai'})"></span>`
    : '';
  return `${dot}往 ${fixTo(d.to)}`;
}

function buildDirSeg() {
  const st = curStation();
  const dirs = getDirections(st);
  const row = $('dirRow');
  const seg = $('dirSeg');
  if (!st || dirs.length < 2) {
    row.hidden = true;
    state.dirIdx = 0;
    return;
  }
  row.hidden = false;
  if (state.dirIdx >= dirs.length) state.dirIdx = 0;
  seg.innerHTML = dirs.map((d, i) =>
    `<button type="button" data-i="${i}" class="${i === state.dirIdx ? 'on' : ''}">${dirBtnLabel(d)}</button>`
  ).join('');
}

function tableFor(dir, type) { return type === 'weekend' ? dir.weekend : dir.weekday; }

function upcoming(dir, todayType, prevType, curSec) {
  if (!dir) return [];
  const list = [];
  const collect = (tbl, daytype) => {
    if (!tbl) return;
    for (const h in tbl) {
      const hh = parseInt(h, 10);
      for (const m of tbl[h]) {
        const clock = hh * 60 + parseInt(m, 10);
        const depMin = hh < 4 ? clock + 1440 : clock;
        list.push({
          clock,
          depSec: depMin * 60,
          branch: branchFor(dir, h, m, daytype),
        });
      }
    }
  };
  if (curSec < 180 * 60) collect(tableFor(dir, prevType), prevType);
  collect(tableFor(dir, todayType), todayType);
  return list.filter(x => x.depSec >= curSec).sort((a, b) => a.depSec - b.depSec);
}

function branchColor(br) {
  return br === 'kanding' ? 'var(--kanding)' : 'var(--danhai)';
}

function fmtClock(clock) { return pad(Math.floor(clock / 60) % 24) + ':' + pad(clock % 60); }
function fmtCountdown(sec) {
  if (sec < 60) return `${sec} 秒`;
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m < 60) return `${m} 分 ${pad(s)} 秒`;
  return `${Math.floor(m / 60)} 小時 ${pad(m % 60)} 分`;
}

function render() {
  const now = taipeiNow();
  $('now').textContent = '🕒 ' + now.text;
  const autoType = isWeekend(now.wd) ? 'weekend' : 'weekday';
  const todayType = state.type === 'auto' ? autoType : state.type;
  const prevType = state.type === 'auto'
    ? (isWeekend((now.wd + 6) % 7) ? 'weekend' : 'weekday')
    : state.type;
  const bd = $('daybadge');
  bd.className = 'badge ' + (todayType === 'weekend' ? 'we' : 'wd');
  bd.textContent = (todayType === 'weekend' ? '假日班表' : '平日班表') + (state.type === 'auto' ? '（自動）' : '');

  const st = curStation();
  if (!st) return;
  const dir = activeDirection(st);
  if (!dir) {
    $('result').innerHTML = '<div class="card"><div class="empty">此站尚無班表資料。</div></div>';
    return;
  }
  const curSec = now.h * 3600 + now.m * 60 + now.s;
  const up = upcoming(dir, todayType, prevType, curSec);
  const showBranch = TRUNK_DYNAMIC.has(st.code);
  const n0 = up[0];
  const br0 = n0?.branch;
  applyTheme();
  const col = showBranch && br0 ? branchColor(br0) : lineColor();
  const r = $('result');

  if (up.length === 0) {
    r.innerHTML = `<div class="card"><div class="tag"><span class="dot" style="background:${col}"></span>${st.code} ${st.name} ・ 往 ${fixTo(dir.to)}</div>
      <div class="empty">⚠️ 今日營運時間已過，目前沒有下一班列車。</div></div>`;
    return;
  }
  const wait0 = n0.depSec - curSec;
  const soon = wait0 <= 180 ? 'soon' : '';
  const branchHtml = showBranch && br0
    ? `<div class="branch-line">本班列車：<b style="color:${branchColor(br0)}">${BRANCH_LABEL[br0]}</b></div>`
    : '';
  let html = `<div class="card next">
    <div class="tag"><span class="dot" style="background:${col}"></span>${st.code} ${st.name} ・ 往 ${fixTo(dir.to)}</div>
    <div class="big"><span class="time">${fmtClock(n0.clock)}</span><span class="to">下一班發車</span></div>
    ${branchHtml}
    <div class="count ${soon}">還有 <b>${fmtCountdown(wait0)}</b>${soon ? ' 🔴 即將發車' : ''}</div>
  </div>`;
  if (up[1]) {
    const n1 = up[1];
    const wait1 = n1.depSec - curSec;
    const br1 = showBranch && n1.branch
      ? ` · <span style="color:${branchColor(n1.branch)}">${BRANCH_LABEL[n1.branch]}</span>`
      : '';
    html += `<div class="card second"><div class="row">
      <div><div class="tag" style="margin:0">下下班</div><span class="time">${fmtClock(n1.clock)}</span>${br1}</div>
      <div class="c">還有 ${fmtCountdown(wait1)}</div></div></div>`;
  }
  r.innerHTML = html;
}

function switchLine(line) {
  state.line = line;
  state.code = DEFAULTS[line];
  state.dirIdx = 0;
  [...$('lineTabs').children].forEach(b => b.classList.toggle('on', b.dataset.line === line));
  applyTheme();
  buildMap();
  buildDirSeg();
  render();
}

function selectStation(code) {
  state.code = code;
  state.dirIdx = 0;
  applyTheme();
  buildMap();
  buildDirSeg();
  render();
}

$('lineTabs').addEventListener('click', e => {
  const b = e.target.closest('button[data-line]');
  if (!b || b.dataset.line === state.line) return;
  switchLine(b.dataset.line);
});

$('routeMap').addEventListener('click', e => {
  const btn = e.target.closest('.st-node');
  if (!btn) return;
  selectStation(btn.dataset.code);
});

$('dirSeg').addEventListener('click', e => {
  const b = e.target.closest('button[data-i]');
  if (!b) return;
  state.dirIdx = parseInt(b.dataset.i, 10);
  [...$('dirSeg').children].forEach(x => x.classList.toggle('on', x === b));
  applyTheme();
  buildMap();
  render();
});

$('typeSeg').addEventListener('click', e => {
  const b = e.target.closest('button[data-v]');
  if (!b) return;
  state.type = b.dataset.v;
  [...$('typeSeg').children].forEach(x => x.classList.toggle('on', x === b));
  render();
});

const VERSION = '20260529';
const THEME_KEY = 'ntmetro-theme';

function getPreferredTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'light' || saved === 'dark') return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function updateThemeBtn(theme) {
  const btn = $('themeBtn');
  const isLight = theme === 'light';
  btn.textContent = isLight ? '🌙' : '☀️';
  btn.setAttribute('aria-label', isLight ? '切換深色模式' : '切換淺色模式');
  btn.title = isLight ? '切換深色模式' : '切換淺色模式';
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  updateThemeBtn(theme);
}

$('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  setTheme(next);
});

setTheme(getPreferredTheme());
applyTheme();
buildMap();
buildDirSeg();
render();
setInterval(render, 1000);
</script>
</body>
</html>
